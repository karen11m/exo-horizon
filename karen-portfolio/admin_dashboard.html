<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Karen Méndez</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            padding-top: 80px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            background: var(--surface-color);
        }
        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface-color);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: 800;
            color: var(--accent-color);
        }
        .messages-table {
            width: 100%;
            border-collapse: collapse;
        }
        .messages-table th {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-muted);
        }
        .messages-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .badge {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-color);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
        }
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius);
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .btn-primary {
            background: var(--accent-color);
            color: #000;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <header class="navbar" style="position: fixed; top: 0; width: 100%; z-index: 1000;">
        <div class="container nav-container">
            <a href="/" class="logo">Karen Méndez <span>Dev</span> <small style="font-size: 0.5em; opacity: 0.7;">Admin</small></a>
            <nav class="nav-links">
                <a href="/">Volver al Portfolio</a>
            </nav>
        </div>
    </header>

    <div class="admin-container">
        <div class="header">
            <div>
                <h1>Panel de Mensajes</h1>
                <p style="color: var(--text-muted)">Administra los mensajes de tus clientes</p>
            </div>
            <div class="status-badge">
                Estado: <span id="status" style="color: var(--accent-color)">Conectado</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-messages">0</div>
                <div style="color: var(--text-muted)">Mensajes Totales</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 20px;">Mensajes Recientes</h3>
            <div style="overflow-x: auto;">
                <table class="messages-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Tipo</th>
                            <th>Mensaje</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="messages-table">
                        <!-- Mensajes se cargarán aquí -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_TOKEN = "admin123";

        async function loadMessages() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Actualizando...";
            
            try {
                const response = await fetch(`/api/messages?token=${ADMIN_TOKEN}`);
                
                if (response.status === 401) {
                    throw new Error("Acceso denegado");
                }

                const messages = await response.json();
                
                // Actualizar contador
                document.getElementById('total-messages').innerText = messages.length;

                // Actualizar tabla
                const tbody = document.getElementById('messages-table');
                tbody.innerHTML = '';

                if (messages.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px;">No hay mensajes aún.</td></tr>';
                } else {
                    messages.forEach(msg => {
                        const row = `
                            <tr>
                                <td><strong>${msg.name}</strong></td>
                                <td><a href="mailto:${msg.email}" style="color: var(--text-main)">${msg.email}</a></td>
                                <td><span class="badge">${msg.project_type}</span></td>
                                <td>${msg.message}</td>
                                <td><small style="color: var(--text-muted)">${msg.created_at}</small></td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }
                
                statusEl.innerText = "En vivo";
                statusEl.style.color = "var(--accent-color)";

            } catch (error) {
                console.error(error);
                statusEl.innerText = "Error";
                statusEl.style.color = "red";
            }
        }

        // Cargar al inicio
        loadMessages();

        // Actualizar cada 5 segundos
        setInterval(loadMessages, 5000);
    </script>
</body>
</html>
